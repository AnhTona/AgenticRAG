# ===== SERVER =====
server.port=8081

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/etco_rag?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== OLLAMA =====
etco.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
etco.ollama.chat-model=llama3.2-vision
etco.ollama.embedding-model=nomic-embed-text
etco.ollama.keep-alive=30m

# ===== RAG =====
etco.rag.chunk-size=1000
etco.rag.chunk-overlap=200
etco.rag.top-k=5
etco.rag.similarity-threshold=0.3
etco.rag.embedding-batch-size=20

# ===== AGENT =====
etco.agent.max-iterations=3
etco.agent.temperature=0.3

# ===== MAIN SERVER (goi nguoc lay data event/ticket/order) =====
etco.main-server.base-url=${MAIN_SERVER_URL:http://localhost:8080}

# ===== INTERNAL API KEY (xac thuc giua 2 server) =====
etco.internal.api-key=${INTERNAL_API_KEY:etco-internal-secret-2026}